services:
  postgres:
    image: postgres:16
    container_name: postgres-container-auth
    restart: always
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: authDB
    ports:
      - "5407:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
